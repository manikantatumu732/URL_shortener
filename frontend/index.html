<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snip — URL Shortener</title>
    <!--
      Sets the initial dark/light class before React mounts, so there is
      no flash of the wrong theme while the app boots. Mirrors the same
      "system preference if nothing saved" logic used in ThemeContext.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved === 'light' || saved === 'dark' ? saved : (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          // localStorage may be unavailable (privacy mode, etc.) — default
          // to light and let ThemeContext take over once React mounts.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
